<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBBVIP - Select Region / Chọn Khu Vực</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #09090b;
            font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; color: #fff; overflow: hidden;
            position: relative;
        }
        
        /* Video Background */
        .video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
            opacity: 0.6;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        .gate-container {
            text-align: center; padding: 40px 20px; width: 100%; max-width: 700px;
            animation: fadeIn 0.8s ease-out forwards;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-icon {
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        .logo-icon i { font-size: 40px; color: #fff; }
        h1 {
            font-size: 36px; font-weight: 800; margin-bottom: 10px;
            color: #fff; letter-spacing: 1px;
            text-transform: uppercase;
        }
        p { color: #e2e8f0; font-size: 16px; margin-bottom: 40px; font-weight: 500; }
        
        .flags-wrapper { display: flex; gap: 25px; justify-content: center; flex-wrap: wrap; }
        
        .flag-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 25px; border-radius: 24px;
            width: calc(50% - 15px); min-width: 240px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .flag-card:hover {
            transform: translateY(-10px); border-color: #3b82f6;
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.4); background: rgba(59, 130, 246, 0.2);
        }
        .flag-card img, .flag-card .earth-icon {
            width: 100px; height: 100px; border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.4s;
            object-fit: cover;
        }
        .flag-card .earth-icon {
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            font-size: 50px; color: white;
        }
        .flag-card:hover img, .flag-card:hover .earth-icon { transform: scale(1.08); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .flag-card span { color: #f8fafc; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; z-index: 1;}
        .flag-card small { color: #cbd5e1; font-size: 13px; z-index: 1; font-weight: 500;}
        
        .footer-note { margin-top: 50px; color: rgba(255,255,255,0.5); font-size: 13px; }
        
        @media (max-width: 600px) {
            .flags-wrapper { flex-direction: column; width: 100%; }
            .flag-card { width: 100%; }
        }
    </style>
</head>
<body>
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2020/05/25/40141-424883490_large.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="gate-container">
        <div class="logo-icon">
            <i class="fa-solid fa-globe"></i>
        </div>
        <h1>SELECT YOUR REGION</h1>
        <p>Vui lòng chọn khu vực / Please choose your region</p>
        
        <div class="flags-wrapper">
            <a href="?lang=vi" class="flag-card">
                <img src="https://flagcdn.com/w160/vn.png" alt="Vietnam">
                <span>VIỆT NAM</span>
                <small>Dành cho người Việt</small>
            </a>
            <a href="?lang=en" class="flag-card">
                <div class="earth-icon"><i class="fa-solid fa-earth-americas"></i></div>
                <span>INTERNATIONAL</span>
                <small>For Global Users</small>
            </a>
        </div>
        
        <div class="footer-note">OBBVIP Security System &copy; 2026</div>
    </div>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"cb0b085e3b9f4f8db0f6bfbf0324d3b1","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
